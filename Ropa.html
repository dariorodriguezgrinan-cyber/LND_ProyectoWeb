    <aside>
        <figure class="historia-container slide-left">
            <h1 class="historia-titulo">Nuestra historia</h1>
            <img class="Historia" src="img/Mind.jpg" alt="Mind">
            <figcaption class="Textos">

                <span class="texto-largo">
                    Todo comenzó con una idea simple pero poderosa: crear ropa que diga algo sin
                    tener que hablar. En un mundo saturado de tendencias rápidas y copias sin alma, nació nuestra marca
                    como
                    una respuesta a quienes buscan identidad, actitud y autenticidad en lo que visten. <br> Empezamos
                    desde
                    cero, con bocetos hechos de madrugada, conversaciones llenas de sueños y una obsesión clara: no
                    hacer
                    ropa por hacerla, sino diseñar piezas que representen a personas reales, con historias reales. Cada
                    prenda nace de la calle, de la cultura, del arte y de las emociones que nos mueven día a día. <br>
                    Hoy,
                    la marca está creciendo paso a paso, construyéndose con una comunidad que cree en lo mismo que
                    nosotros:
                    vestirse no es seguir una moda, es expresar quién eres. <br>Estamos perfeccionando cada detalle
                    —desde
                    los materiales hasta el diseño— apostando por calidad, comodidad y estilo atemporal. No buscamos ser
                    los
                    más grandes, buscamos ser los más genuinos. <br> Nuestro objetivo es claro: convertirnos en una
                    marca
                    que acompañe a las personas en su camino, que inspire seguridad, carácter y libertad. Queremos que
                    cada
                    vez que alguien use nuestras prendas sienta que pertenece a algo más grande: una mentalidad, una
                    actitud, una forma de ver el mundo. <br> Esto no es solo ropa. Es una declaración. Y apenas estamos
                    comenzando.
                </span>
                <span class="texto-corto">Nuestra marca nació para expresar identidad y autenticidad.</span>
            </figcaption>
        </figure>
    </aside>
    <br>
    <br>
    <aside>
        <figure class="historia-container reverse slide-right">
            <h1 class="historia-titulo">Nuestra historia</h1>
            <img class="Historia" src="img/Creador.jpg" alt="Creador">
            <figcaption class="Textos">

                <span class="texto-largo">
                    Esta marca empezó en un momento en el que no tenía todo claro. Lo que sí sabía
                    era que no me sentía representado por lo que veía. Iba a tiendas, veía ropa bien hecha, pero vacía.
                    Nada
                    hablaba de mí, de mi proceso, de mis ideas ni de mis ganas de crear algo propio. <br> No empecé
                    sabiendo
                    de moda, empecé aprendiendo. Vi errores antes que aciertos. Probé proveedores que no funcionaron,
                    diseños que tuve que descartar y decisiones que me costaron dinero y tiempo. <br> Muchas veces
                    trabajé
                    en esto cuando nadie lo veía: noches largas, dudas constantes y la presión de estar construyendo
                    algo
                    sin garantías. Lo más complicado no fue lo técnico, fue confiar en mí mismo cuando todavía no había
                    resultados. <br> Cada prenda representa una etapa, una idea que sobrevivió a las dudas. No está
                    pensada
                    para todos, está pensada para quienes entienden lo que es empezar desde abajo y seguir aun sin
                    aplausos.
                    <br> Y si estás leyendo esto, quiero que sepas algo: no solo estás comprando ropa, estás apoyando
                    una
                    historia que se está escribiendo en tiempo real. <br> Gracias por ser parte del comienzo.
                </span>
                <span class="texto-corto">El creador inició la marca para transmitir sus ideas únicas.</span>

            </figcaption>
        </figure>
