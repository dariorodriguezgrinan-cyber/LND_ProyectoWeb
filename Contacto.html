<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="contacto.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&display=swap" rel="stylesheet">

</head>

<body>
    <div class="contacto">
        <h1>Contacto</h1>

        <p>Si quieres escribirme, puedes enviar un mensaje mediante el formulario a continuación:</p>

        <form action="#" method="POST">
            <input type="text" name="nombre" placeholder="Tu nombre" required>
            <input type="email" name="email" placeholder="Tu correo" required>
            <textarea name="mensaje" placeholder="Tu mensaje" required></textarea>
            <button type="submit">Enviar</button>
        </form>

        <p>También puedes seguir publicaciones sobre moda mediante este RSS:</p>
       <p><a href="Ropa.html">Para volver a la página de inicio pulse aquí.</a></p>
    </div>

    <br>

    <!-- start feedwind code -->

        data-fw-param="177272/"></script> <!-- end feedwind code -->
